<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午餐吃什麼？</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .slider-container {
            position: relative;
            width: 100%;
            height: 30px;
        }
        .slider-track {
            position: absolute;
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            top: 12px;
            border-radius: 3px;
        }
        .slider-range {
            position: absolute;
            height: 6px;
            background: #d28eff;
            top: 12px;
            border-radius: 3px;
        }
        input[type="range"] {
            position: absolute;
            width: 100%;
            height: 6px;
            top: 12px;
            background: none;
            pointer-events: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #d28eff;
            cursor: pointer;
            pointer-events: auto;
            -webkit-appearance: none;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen py-8 px-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6 space-y-6">
        <h1 class="text-2xl font-bold text-center text-gray-800">🍽️ 午餐吃什麼？</h1>

        <!-- 第一欄：我的位置 -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">我的位置</label>
            <div class="flex gap-2">
                <input id="location-input" type="text" placeholder="尚未定位（格式：緯度, 經度）" 
                    class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:outline-none" readonly>
                <button id="btn-locate" class="px-4 py-2 text-white font-medium text-sm rounded-lg hover:opacity-90 transition" style="background-color: #d28eff;">
                    自動定位
                </button>
            </div>
        </div>

        <!-- 第二欄：想吃的類型 -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">想吃的類型</label>
            <select id="cuisine-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-purple-300 focus:outline-none">
                <option value="all">隨機（全部）</option>
                <option value="taiwanese">台式</option>
                <option value="korean">韓式</option>
                <option value="japanese">日式</option>
                <option value="thai">泰式</option>
                <option value="cantonese">粵式</option>
                <option value="vietnamese">越式</option>
                <option value="american">美式</option>
                <option value="other">其他</option>
            </select>
        </div>

        <!-- 第三欄：預算區間 -->
        <div>
            <div class="flex justify-between text-sm font-semibold text-gray-700 mb-1">
                <span>預算範圍</span>
                <span id="budget-value">$100 - $300</span>
            </div>
            <div class="slider-container">
                <div class="slider-track"></div>
                <div id="slider-range" class="slider-range" style="left: 10%; right: 50%;"></div>
                <input id="slider-min" type="range" min="50" max="1000" step="50" value="100">
                <input id="slider-max" type="range" min="50" max="1000" step="50" value="350">
            </div>
            <p class="text-xs text-gray-400 mt-1">※ 預算區間將用於篩選符合價位之餐廳</p>
        </div>

        <!-- 搜尋按鈕 -->
        <button id="btn-search" class="w-full py-3 text-white font-bold rounded-lg hover:opacity-90 transition shadow-md" style="background-color: #d28eff;">
            🔍 尋找走路 10 分鐘內餐廳
        </button>

        <!-- 搜尋狀態提示 -->
        <p id="status-text" class="text-center text-sm text-gray-500 hidden"></p>

        <!-- 第四欄：轉盤區域 -->
        <div id="wheel-section" class="hidden flex flex-col items-center space-y-4 pt-4 border-t border-gray-100">
            <div class="relative w-64 h-64">
                <!-- 轉盤指標 -->
                <div class="absolute -top-2 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-t-[20px] border-t-red-500 z-10"></div>
                <!-- 轉盤 Canvas (動畫改為 500ms) -->
                <canvas id="wheel-canvas" width="256" height="256" class="rounded-full shadow-lg transition-transform duration-[500ms] ease-out"></canvas>
            </div>
            <button id="btn-spin" class="px-6 py-2 bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold rounded-full shadow-md transition">
                🎉 開始轉盤！
            </button>
            <p id="remaining-text" class="text-xs text-gray-400"></p>
        </div>

        <!-- 結果展示與地圖按鈕 -->
        <div id="result-section" class="hidden text-center space-y-3 p-4 bg-purple-50 rounded-xl border border-purple-100">
            <h3 class="text-lg font-bold text-gray-800">今天午餐就決定吃：</h3>
            <p id="result-name" class="text-xl font-extrabold text-purple-700"></p>
            <p id="result-detail" class="text-xs text-gray-500"></p>
            <a id="btn-google-map" href="#" target="_blank" class="inline-block px-5 py-2 bg-blue-500 hover:bg-blue-600 text-white font-semibold rounded-lg text-sm shadow transition">
                🗺️ 在 Google 地圖中導航
            </a>
        </div>
    </div>

    <script>
        let lat = null;
        let lng = null;
        let originalList = []; // 備份完整的原始搜尋結果
        let restaurantList = []; // 當前剩餘的候選名單
        let isSpinning = false;

        const locInput = document.getElementById('location-input');
        const btnLocate = document.getElementById('btn-locate');
        const cuisineSelect = document.getElementById('cuisine-select');
        const sliderMin = document.getElementById('slider-min');
        const sliderMax = document.getElementById('slider-max');
        const sliderRange = document.getElementById('slider-range');
        const budgetValue = document.getElementById('budget-value');
        const btnSearch = document.getElementById('btn-search');
        const statusText = document.getElementById('status-text');
        const wheelSection = document.getElementById('wheel-section');
        const wheelCanvas = document.getElementById('wheel-canvas');
        const btnSpin = document.getElementById('btn-spin');
        const remainingText = document.getElementById('remaining-text');
        const resultSection = document.getElementById('result-section');
        const resultName = document.getElementById('result-name');
        const resultDetail = document.getElementById('result-detail');
        const btnGoogleMap = document.getElementById('btn-google-map');

        // 雙滑桿邏輯
        function updateSlider() {
            let minVal = parseInt(sliderMin.value);
            let maxVal = parseInt(sliderMax.value);
            if (minVal > maxVal) {
                let temp = minVal;
                minVal = maxVal;
                sliderMin.value = maxVal;
                maxVal = temp;
                sliderMax.value = temp;
            }
            const minPercent = ((minVal - 50) / 950) * 100;
            const maxPercent = ((maxVal - 50) / 950) * 100;
            sliderRange.style.left = minPercent + '%';
            sliderRange.style.right = (100 - maxPercent) + '%';
            budgetValue.textContent = `$${minVal} - $${maxVal === 1000 ? '1000+' : maxVal}`;
        }
        sliderMin.addEventListener('input', updateSlider);
        sliderMax.addEventListener('input', updateSlider);
        updateSlider();

        // 1. 自動定位
        btnLocate.addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert('您的瀏覽器不支援定位功能。');
                return;
            }
            btnLocate.textContent = '定位中...';
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    lat = position.coords.latitude;
                    lng = position.coords.longitude;
                    locInput.value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                    btnLocate.textContent = '重新定位';
                },
                (error) => {
                    alert('無法取得您的位置，請確認是否開啟 GPS 與定位授權。');
                    btnLocate.textContent = '自動定位';
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        });

        // 2. 餐廳搜尋 (限制走路 10 分鐘約 800 公尺、去重複、排除已歇業、上限 20 家)
        btnSearch.addEventListener('click', async () => {
            if (!lat || !lng) {
                alert('請先點擊「自動定位」按鈕獲取您的位置！');
                return;
            }

            statusText.classList.remove('hidden');
            statusText.textContent = '🔍 正在搜尋附近美食...';
            wheelSection.classList.add('hidden');
            resultSection.classList.add('hidden');

            const radius = 800; // 改為搜尋走路 10 分鐘內（約 800 公尺）
            
            // 【排除已歇業與無效標記】: 排除 disused, abandoned, closed 等標籤
            const query = `
                [out:json][timeout:15];
                (
                  node["amenity"="restaurant"]["name"](around:${radius},${lat},${lng})
                      [!disused][!abandoned][!closed][disused:amenity!~"."][abandoned:amenity!~"."];
                  node["amenity"="fast_food"]["name"](around:${radius},${lat},${lng})
                      [!disused][!abandoned][!closed][disused:amenity!~"."][abandoned:amenity!~"."];
                );
                out body;
            `;

            try {
                const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                if (!response.ok) throw new Error('API 請求失敗');
                const data = await response.json();
                
                const blacklistedKeywords = [
                    '7-11', '7-eleven', '全家', 'family_mart', 'familymart', '萊爾富', 'ok超商', 'ok mart', 
                    '星巴克', 'starbucks', '路易莎', 'louisa', 'cama', '美廉社', '蝦皮', '餐廳', '小吃部', 
                    '攤販', '自動販賣機', '販賣機', '得來速'
                ];

                let rawRestaurants = data.elements
                    .map(el => ({
                        name: (el.tags.name || '').trim(),
                        lat: el.lat,
                        lng: el.lon,
                        cuisine: (el.tags.cuisine || '').toLowerCase(),
                    }))
                    .filter(r => {
                        if (!r.name || r.name.length <= 1) return false;
                        const lowerName = r.name.toLowerCase();
                        const isBlacklisted = blacklistedKeywords.some(kw => lowerName.includes(kw));
                        return !isBlacklisted;
                    });

                // 嚴格去重
                let uniqueRestaurants = [];
                let seenNames = new Set();

                for (let r of rawRestaurants) {
                    if (seenNames.has(r.name)) continue;

                    let isDuplicateLocation = uniqueRestaurants.some(existing => {
                        const dist = getDistance(r.lat, r.lng, existing.lat, existing.lng);
                        const isSimilarName = r.name.includes(existing.name) || existing.name.includes(r.name);
                        return dist < 20 && isSimilarName; 
                    });

                    if (!isDuplicateLocation) {
                        uniqueRestaurants.push(r);
                        seenNames.add(r.name);
                    }
                }

                // 篩選類型
                const selectedCuisine = cuisineSelect.value;
                let filteredList = filterByCuisine(uniqueRestaurants, selectedCuisine);

                // 【改為搜尋 20 家】
                if (filteredList.length > 20) {
                    filteredList = filteredList.sort(() => 0.5 - Math.random()).slice(0, 20);
                }

                if (filteredList.length === 0) {
                    statusText.textContent = '❌ 附近找不到符合您選擇類型的精確餐廳名稱，請換個類型再試試！';
                    return;
                }

                // 初始化名單
                originalList = [...filteredList];
                restaurantList = [...filteredList];

                statusText.textContent = `🎉 成功尋找到 ${restaurantList.length} 家 10 分鐘步行圈內的餐廳！`;
                updateRemainingText();
                drawWheel(restaurantList);
                wheelSection.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                statusText.textContent = '❌ 搜尋時發生錯誤或連線逾時，請稍後再試。';
            }
        });

        // 兩點經緯度距離計算（公尺）
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // 料理篩選邏輯
        function filterByCuisine(list, type) {
            if (type === 'all') return list;
            const keywordMap = {
                taiwanese: ['taiwanese', 'taiwan', 'traditional', 'chinese', 'noodle', 'dumpling', 'beef_noodle', '台灣', '台式', '小吃', '便當', '肉圓', '滷肉飯', '麵攤'],
                japanese: ['japanese', 'sushi', 'ramen', 'donburi', 'bento', '日式', '日本', '拉麵', '壽司', '丼飯', '居酒屋', '定食'],
                korean: ['korean', 'bbq', '韓式', '韓國', '烤肉', '泡菜', '豆腐鍋'],
                thai: ['thai', '泰式', '泰國', '椒麻雞'],
                cantonese: ['cantonese', 'dim_sum', '港式', '粵式', '燒臘', '飲茶', '茶餐廳'],
                vietnamese: ['vietnamese', 'pho', '越式', '越南', '河粉'],
                american: ['american', 'burger', 'fast_food', 'steak', '美式', '漢堡', '牛排', '炸雞'],
                other: []
            };

            const keywords = keywordMap[type];

            if (type === 'other') {
                const allDefinedKeywords = Object.values(keywordMap).flat();
                return list.filter(r => {
                    const name = r.name.toLowerCase();
                    const cuisine = r.cuisine;
                    return !allDefinedKeywords.some(kw => name.includes(kw) || cuisine.includes(kw));
                });
            }

            return list.filter(r => {
                const name = r.name.toLowerCase();
                const cuisine = r.cuisine;
                return keywords.some(kw => name.includes(kw) || cuisine.includes(kw));
            });
        }

        // 更新剩餘候選家數提示
        function updateRemainingText() {
            remainingText.textContent = `剩餘候選店數：${restaurantList.length} 家`;
        }

        // 3. 轉盤繪製
        const ctx = wheelCanvas.getContext('2d');
        const colors = [
            '#FFD2D2', '#FFE4CA', '#FFF9A6', '#D2FFD2', '#D2E9FF', '#E8D2FF', '#FAD2FF', '#E0E0E0',
            '#FFC8C8', '#FFD8B1', '#FFF5B7', '#C1FFC1', '#C1E0FF', '#DEC9FF', '#F9C9FF', '#D3D3D3'
        ];

        function drawWheel(items) {
            const numSegments = items.length;
            ctx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);

            if (numSegments === 0) return;

            const arcSize = (2 * Math.PI) / numSegments;

            for (let i = 0; i < numSegments; i++) {
                const angle = i * arcSize;
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(128, 128);
                ctx.arc(128, 128, 128, angle, angle + arcSize);
                ctx.lineTo(128, 128);
                ctx.fill();

                ctx.save();
                ctx.fillStyle = '#374151';
                
                // 根據項目多寡動態縮小字體，避免 20 家餐廳重疊
                const fontSize = numSegments > 12 ? '9px' : '11px';
                ctx.font = `bold ${fontSize} sans-serif`;
                
                ctx.translate(128, 128);
                ctx.rotate(angle + arcSize / 2);
                
                // 轉盤字數自適應
                let displayName = items[i].name;
                const limit = numSegments > 12 ? 4 : 6;
                if (displayName.length > limit) {
                    displayName = displayName.substring(0, limit - 1) + '..';
                }
                
                ctx.fillText(displayName, 45, 3);
                ctx.restore();
            }
        }

        // 4. 旋轉動畫控制 (改為 500ms 快速定格 + 不重複抽籤邏輯)
        btnSpin.addEventListener('click', () => {
            if (isSpinning) return;

            // 如果全部餐廳都被抽光剃除，自動重新還原名單
            if (restaurantList.length === 0) {
                alert('所有候選餐廳都已經抽過一輪囉！將為您重置名單重新開始。');
                restaurantList = [...originalList];
                drawWheel(restaurantList);
                updateRemainingText();
                resultSection.classList.add('hidden');
                return;
            }

            isSpinning = true;
            resultSection.classList.add('hidden');

            // 500ms 快速旋轉角度計算
            const degrees = 360 * 3 + Math.floor(Math.random() * 360); 
            wheelCanvas.style.transform = `rotate(${degrees}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const actualDegree = degrees % 360;
                const numSegments = restaurantList.length;
                const arcSizeDeg = 360 / numSegments;
                
                // 計算指標指到的索引
                const index = Math.floor(((360 - actualDegree + 270) % 360) / arcSizeDeg);
                const winner = restaurantList[index];

                // 顯示結果
                resultName.textContent = winner.name;
                resultDetail.textContent = `這家店現在已從轉盤中移除。不滿意的話可以點擊「開始轉盤」繼續抽剩下的店家！`;
                btnGoogleMap.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(winner.name)}&query_place_id=&query=${winner.lat},${winner.lng}`;
                resultSection.classList.remove('hidden');

                // 【不重複轉出核心邏輯】: 從陣列中將本次抽到的 winner 移除
                restaurantList.splice(index, 1);

                // 重新繪製剩餘店家的轉盤
                drawWheel(restaurantList);
                updateRemainingText();

                // 重置旋轉角度動畫屬性，防止下次旋轉異常
                wheelCanvas.style.transition = 'none';
                wheelCanvas.style.transform = `rotate(${actualDegree}deg)`;
                setTimeout(() => {
                    wheelCanvas.style.transition = 'transform 500ms ease-out';
                }, 50);

            }, 500); // 動畫時間縮短為 500ms
        });
    </script>
</body>
</html>
